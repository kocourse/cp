<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>計算物理</title>

<link rel="stylesheet" href="assets/style.css">
    <style>
    /* 1. 嚴格鎖定整個瀏覽器視窗，不允許大視窗自己出現雙重捲軸 */
    html, body {
        height: 100% !important;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        overflow: hidden; 
    }

    /* 2. 外層 Flex 容器，寬高嚴格等於一整個螢幕 */
    .container {
        display: flex;
        height: 100vh !important;
        width: 100vw;
        overflow: hidden;
    }

    /* 3. 左側邊欄設定 */
    .sidebar {
        width: 220px;
        background: #1f2937;
        color: #f9fafb;
        height: 100%;
        padding: 20px;
        box-sizing: border-box;
        overflow-y: auto; /* 如果選單太長，左邊可以自己獨立滾動 */
    }

    .sidebar h3 { color: white; margin-top: 0; }
    .sidebar a { color: #f9fafb; display: block; padding: 8px 0; text-decoration: none; }
    .sidebar a:hover { color: #60a5fa; }
    
    /* 4. 右側內容容器：高度必須鎖死在 100% */
    .content {
        flex: 1;
        height: 100% !important;
        overflow: hidden; /* 防止這裡偷跑出捲軸 */
        padding: 0;
        margin: 0;
    }

    /* 5. 內嵌視窗本身：強制頂滿，並自動產生最右邊的網頁捲軸 */
    .content-frame {
        width: 100%;
        height: 100% !important; /* 強制把 iframe 拉高到最底部 */
        border: none;
        display: block;
        overflow: auto !important; /* 當內容太長時，自動長出捲軸 */
    }
    </style>
</head>

<body>

<div class="container">
  <div class="sidebar">
    <h3><a href="lectures.html" target="left-frame">計算物理</a></h3>
    <a href="#">cygwin常用指令</a>
    <a href="#">.bashrc</a>
  </div>
  <div class="content">
    <iframe src="lectures.html" name="left-frame" class="content-frame"></iframe>
  </div>
</div>
  

</body>
</html>
